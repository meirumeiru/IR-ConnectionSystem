@PART[ht2_JEM_port]:FOR[IRConnectionSystem_v1]
{
	-MODULE[ModuleDockingNode] {}

	%MODULE[ModuleIRLEE]
	{
		name = ModuleIRLEE
		referenceAttachNode = dockingNode
		nodeType = ht2_JEM

		snapCount = 3
		dockingOrientation = 1,0,0
	}
}

